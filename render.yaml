services:
  # Unified Monolith: Backend API + UI + AI Worker (All in one free service)
  - type: web
    name: gitlytics-app
    plan: free
    runtime: python
    buildCommand: |
      # 1. Build Frontend
      cd frontend && npm install && npm run build && cd ..
      # 2. Move to Backend Static Folder
      rm -rf backend/app/static && mv frontend/dist backend/app/static
      # 3. Install Backend Deps
      pip install -r backend/requirements.txt
    startCommand: |
      # Start AI Worker in background and then start API
      cd backend && celery -A app.tasks.analysis.celery worker --loglevel=info &
      cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: gitlytics-db
          property: connectionString
      - key: REDIS_URL
        sync: false
      - key: GITHUB_REDIRECT_URI
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: gitlytics-db
    plan: free
