services:
  # Backend API
  - type: web
    name: gitlytics-api
    plan: free
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: gitlytics-db
          property: connectionString
      - key: REDIS_URL
        value: # TO_BE_PROVIDED_BY_USER_FROM_UPSTASH
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

  # Celery Worker
  - type: worker
    name: gitlytics-worker
    plan: free # Note: Render free tier restrictions may apply to workers
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && celery -A app.tasks.analysis.celery worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gitlytics-db
          property: connectionString
      - key: REDIS_URL
        value: # TO_BE_PROVIDED_BY_USER_FROM_UPSTASH
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # Frontend (Static Site)
  - type: web
    name: gitlytics-frontend
    plan: free
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: gitlytics-api
          property: host

databases:
  - name: gitlytics-db
    plan: free
